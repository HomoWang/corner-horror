<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>407 號房 — 控制器 · Voice by elevenlabs.io</title>
<style>
  :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 50%, rgba(91, 22, 18, .13), transparent 36%),
      #020202;
    color: #766d69;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  button { font: inherit; -webkit-tap-highlight-color: transparent; }
  #controller {
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    place-items: center;
    padding: max(1rem, env(safe-area-inset-top)) 1.2rem max(1rem, env(safe-area-inset-bottom));
  }
  #top {
    width: min(100%, 28rem);
    text-align: center;
  }
  #status { margin: 0; min-height: 1.2rem; color: #5c5552; font-size: .72rem; }
  #screen-cue { margin: .45rem 0 0; color: #302c2a; font-size: .66rem; letter-spacing: .16em; }
  #audio-diag {
    margin: .4rem 0 0;
    min-height: 2.4rem;
    color: #46403d;
    font-size: .58rem;
    line-height: 1.4;
    white-space: pre-line;
  }
  #start,
  #action {
    width: min(52vw, 13rem);
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid #5c3934;
    background:
      radial-gradient(circle at 50% 42%, rgba(75,27,23,.72), rgba(24,8,7,.95) 55%, #090504 72%);
    color: #d0aaa2;
    font-size: 1rem;
    letter-spacing: .18em;
    box-shadow:
      inset 0 0 2.5rem rgba(0,0,0,.75),
      0 0 0 .45rem rgba(36,13,11,.65),
      0 0 4rem rgba(101,27,21,.22);
  }
  #start:active,
  #action:active,
  #action.pressed {
    transform: scale(.93);
    border-color: #a15b50;
    background: radial-gradient(circle, #7a2922, #260a08 62%, #080303);
    box-shadow: inset 0 0 2rem #160202, 0 0 4.5rem rgba(158,48,37,.38);
  }
  body.started #start { display: none; }
  #controls { display: none; place-items: center; width: 100%; height: 100%; }
  #controls.active { display: grid; }
  #recenter {
    padding: .5rem 1rem;
    border: 0;
    background: transparent;
    color: #4e4744;
    font-size: .72rem;
  }
  #voice-credit {
    position: fixed;
    right: .55rem;
    bottom: .35rem;
    color: #282322;
    font-size: .48rem;
    text-decoration: none;
  }
  body[data-story='incoming-407'] #action {
    animation: incoming-pulse 1.05s infinite;
  }
  @keyframes incoming-pulse {
    50% { border-color: #9f554b; box-shadow: inset 0 0 2.5rem #090000, 0 0 5rem rgba(145,38,29,.42); }
  }
</style>
<main id="controller">
  <header id="top">
    <p id="status">連線中…</p>
    <p id="screen-cue">把手機音量開大・不用再低頭</p>
    <p id="audio-diag" aria-live="polite"></p>
  </header>
  <button id="start" type="button">開始</button>
  <div id="controls">
    <button id="action" type="button" aria-label="互動">互動</button>
  </div>
  <button id="recenter" type="button">重新對準畫面中央</button>
</main>
<a id="voice-credit" href="https://elevenlabs.io" rel="noreferrer">voice: elevenlabs.io</a>
<script type="module" src="/src/controller/main.ts"></script>

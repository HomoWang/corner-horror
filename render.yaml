services:
  - type: web
    name: corner-horror-relay-homowang
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build:server
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ALLOWED_ORIGINS
        value: https://homowang.github.io
